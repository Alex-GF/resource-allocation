# device_density < 1 will randomly (with seed) filter out devices
# client_density < 1 will randomly (with seed) filter out clients
# box_coordinates defines a square area (lat/long); first point = last point

# max_distance serves as a proxy for latency; services must be deployed on devices within distance
# budget ...

# Potential distances as generated by Gemini

# -------------------------------------------------------------------------------------------------------------------------
# NETWORK TOPOLOGY & TECHNOLOGY PROFILES
# -------------------------------------------------------------------------------------------------------------------------
# | Service       | Latency | Max Dist | Technology Description                                                           |
# |---------------|---------|----------|----------------------------------------------------------------------------------|
# | AR/VR         | < 15ms  | < 25m    | Wi-Fi 7 / WiGig (60GHz). High throughput (Multi-Link Operation) for 4K/8K video. |
# | Robot IoT     | < 1ms   | < 50m    | Private 5G / TSN (Time Sensitive Networking). Deterministic packet delivery.     |
# | Lidar V2X     | < 10ms  | < 300m   | C-V2X (Cellular Vehicle-to-Everything). Direct "sidelink" broadcast (PC5 mode).  |
# | Video Privacy | N/A     | < 100m   | On-Prem 10GbE LAN. Physically air-gapped or firewall-geofenced within building.  |
# -------------------------------------------------------------------------------------------------------------------------

